[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/chat-rts"
  to = "/.netlify/functions/chat-rts"
  status = 200

[[redirects]]
  from = "/mcp"
  to = "/.netlify/functions/mcp-tracker"
  status = 200
